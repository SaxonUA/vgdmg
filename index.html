<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вгадай дамаг - виграй золото!</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      background: transparent !important;
      font-family: "Inter", sans-serif;
      color: #fff;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .damage-widget {
      width: 760px;
      max-width: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 152, 0, 0.22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(38, 198, 218, 0.18), transparent 38%),
        rgba(9, 14, 24, 0.76);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 42px;
      padding: 34px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 3px solid #ff9800;
      box-shadow:
        0 30px 70px rgba(0, 0, 0, 0.72),
        inset 0 1px 2px rgba(255, 255, 255, 0.10);
    }

    .top-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 132px;
      margin-bottom: 14px;
    }

    .icon-box {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 132px;
      height: 132px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ff9800;
      font-size: 60px;
      flex: 0 0 auto;
    }

    .title {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 50px;
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.8px;
      background: linear-gradient(135deg, #ffffff 0%, #c8c8c8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .title span {
      display: block;
    }

    .main-stat {
      position: relative;
      margin-top: 10px;
      padding: 28px 34px 30px;
      border-radius: 34px;
      text-align: center;
      background: rgba(0, 0, 0, 0.30);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .main-label {
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.82);
      margin-bottom: 14px;
    }

    .damage-main-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      width: 100%;
    }

    .main-value {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 146px;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -5px;
      color: #ff9800;
      text-shadow: 0 0 34px rgba(255, 152, 0, 0.24);
      text-align: center;
    }

    .side-stats {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 80px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      align-items: stretch;
    }

    .side-pill {
      padding: 7px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-align: left;
      font-size: 10px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.60);
      line-height: 1.05;
      white-space: nowrap;
    }

    .side-pill strong {
      display: block;
      margin-top: 3px;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 19px;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.94);
      line-height: 1;
    }

    .side-pill.winrate strong {
      color: #ff9800;
      font-size: 18px;
    }

    .battle-info {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      color: rgba(255, 255, 255, 0.58);
      font-size: 15px;
      font-weight: 600;
    }

    .battle-pill {
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .battle-pill strong {
      color: rgba(255, 255, 255, 0.88);
      font-weight: 800;
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 20px;
    }

    .player-card {
      padding: 18px 10px;
      border-radius: 26px;
      text-align: center;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.045);
    }

    .player-name {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.70);
      margin-bottom: 10px;
    }

    .player-damage {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 35px;
      font-weight: 800;
      line-height: 1;
    }

    .player-card:nth-child(1) .player-damage {
      color: #2ef27c;
    }

    .player-card:nth-child(2) .player-damage {
      color: #26c6da;
    }

    .player-card:nth-child(3) .player-damage {
      color: #ff5e7d;
    }

    .average-box {
      margin-top: 13px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .average-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.46);
      margin-bottom: 6px;
    }

    .average-value {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      color: rgba(255, 255, 255, 0.86);
    }

    @media (max-width: 700px) {
      .damage-widget {
        width: 100%;
        padding: 24px;
        border-radius: 32px;
      }

      .top-row {
        min-height: auto;
        flex-direction: column;
        gap: 16px;
      }

      .icon-box {
        position: static;
        transform: none;
        width: 96px;
        height: 96px;
        border-radius: 28px;
        font-size: 44px;
      }

      .title {
        font-size: 30px;
      }

      .main-stat {
        padding: 24px 18px 28px;
      }

      .damage-main-row {
        min-height: auto;
        flex-direction: column;
        gap: 16px;
      }

      .main-value {
        font-size: 86px;
        letter-spacing: -3px;
      }

      .side-stats {
        position: static;
        transform: none;
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
      }

      .side-pill {
        text-align: center;
        font-size: 11px;
        padding: 8px 6px;
      }

      .side-pill strong {
        font-size: 17px;
      }

      .players-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="damage-widget">
    <div class="top-row">
      <div class="icon-box">
        <i class="fa-solid fa-coins"></i>
      </div>

      <div class="title">
        <span>Вгадай дамаг -</span>
        <span>виграй золото!</span>
      </div>
    </div>

    <div class="main-stat">
      <div class="main-label">Дамаг в останньому бою</div>

      <div class="damage-main-row">
        <div class="main-value" id="total_damage">0</div>

        <div class="side-stats">
          <div class="side-pill">
            К-ть боїв
            <strong id="battles_count">0</strong>
          </div>

          <div class="side-pill">
            Перемоги
            <strong id="wins_count">0</strong>
          </div>

          <div class="side-pill winrate">
            WR
            <strong id="win_rate">0%</strong>
          </div>
        </div>
      </div>

      <div class="battle-info">
        <div class="battle-pill">Бій № <strong id="battle_number">—</strong></div>
        <div class="battle-pill">Результат: <strong id="battle_result">—</strong></div>
      </div>
    </div>

    <div class="players-grid">
      <div class="player-card">
        <div class="player-name">Saxon</div>
        <div class="player-damage" id="damage_saxon">0</div>
        <div class="average-box">
          <div class="average-label">Середній дамаг</div>
          <div class="average-value" id="avg_saxon">0</div>
        </div>
      </div>

      <div class="player-card">
        <div class="player-name">Вірка</div>
        <div class="player-damage" id="damage_virka">0</div>
        <div class="average-box">
          <div class="average-label">Середній дамаг</div>
          <div class="average-value" id="avg_virka">0</div>
        </div>
      </div>

      <div class="player-card">
        <div class="player-name">Yablochko</div>
        <div class="player-damage" id="damage_yablochko">0</div>
        <div class="average-box">
          <div class="average-label">Середній дамаг</div>
          <div class="average-value" id="avg_yablochko">0</div>
        </div>
      </div>
    </div>
  </div>

<script>
(function () {
  const SHEET_ID = "17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk";
  const GID = "506446790";
  const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

  const REFRESH_MS = 5000;
  const ANIMATION_MS = 1200;

  const totalEl = document.getElementById("total_damage");

  const saxonEl = document.getElementById("damage_saxon");
  const virkaEl = document.getElementById("damage_virka");
  const yablochkoEl = document.getElementById("damage_yablochko");

  const avgSaxonEl = document.getElementById("avg_saxon");
  const avgVirkaEl = document.getElementById("avg_virka");
  const avgYablochkoEl = document.getElementById("avg_yablochko");

  const battleNumberEl = document.getElementById("battle_number");
  const battleResultEl = document.getElementById("battle_result");
  const battlesCountEl = document.getElementById("battles_count");
  const winsCountEl = document.getElementById("wins_count");
  const winRateEl = document.getElementById("win_rate");

  let lastTotal = 0;

  let lastSaxon = 0;
  let lastVirka = 0;
  let lastYablochko = 0;

  let lastAvgSaxon = 0;
  let lastAvgVirka = 0;
  let lastAvgYablochko = 0;

  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cur = "";
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const ch = text[i];

      if (ch === '"') {
        if (inQuotes && text[i + 1] === '"') {
          cur += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (ch === "," && !inQuotes) {
        row.push(cur);
        cur = "";
      } else if ((ch === "\n" || ch === "\r") && !inQuotes) {
        if (ch === "\r" && text[i + 1] === "\n") {
          i++;
        }

        row.push(cur);
        rows.push(row);
        row = [];
        cur = "";
      } else {
        cur += ch;
      }
    }

    if (cur.length || row.length) {
      row.push(cur);
      rows.push(row);
    }

    return rows;
  }

  function toNumber(value) {
    if (value === undefined || value === null) {
      return 0;
    }

    const cleaned = String(value)
      .replace(/\s/g, "")
      .replace(",", ".")
      .replace(/[^\d.-]/g, "");

    const n = Number(cleaned);

    return Number.isFinite(n) ? Math.round(n) : 0;
  }

  function isFilled(value) {
    return value !== undefined && value !== null && String(value).trim() !== "";
  }

  function formatNumber(value) {
    return Math.round(value).toLocaleString("uk-UA");
  }

  function formatPercent(value) {
    return value.toFixed(1).replace(".", ",") + "%";
  }

  function easeOutCubic(x) {
    return 1 - Math.pow(1 - x, 3);
  }

  function animateNumber(element, from, to, duration) {
    if (from === to) {
      element.textContent = formatNumber(to);
      return;
    }

    const startTime = performance.now();

    function frame(now) {
      const progress = Math.min((now - startTime) / duration, 1);
      const eased = easeOutCubic(progress);
      const current = from + (to - from) * eased;

      element.textContent = formatNumber(current);

      if (progress < 1) {
        requestAnimationFrame(frame);
      } else {
        element.textContent = formatNumber(to);
      }
    }

    requestAnimationFrame(frame);
  }

  function getBattleRows(rows) {
    const battleRows = [];

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];

      const saxon = toNumber(row[4]);      // E
      const virka = toNumber(row[5]);      // F
      const yablochko = toNumber(row[6]);  // G

      if (saxon > 0 || virka > 0 || yablochko > 0) {
        battleRows.push(row);
      }
    }

    return battleRows;
  }

  function calculateWinStatsByColumnL(rows) {
    let lastBattleNumber = 0;
    let wins = 0;

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];

      const battleNumber = toNumber(row[0]); // A
      const winValue = row[11];              // L

      if (battleNumber > 0) {
        lastBattleNumber = battleNumber;
      }

      if (isFilled(winValue)) {
        wins += toNumber(winValue);
      }
    }

    const battlesCount = lastBattleNumber;
    const winRate = battlesCount > 0 ? (wins / battlesCount) * 100 : 0;

    return {
      battlesCount,
      wins,
      winRate
    };
  }

  function calculateStats(rows) {
    const battleRows = getBattleRows(rows);
    const winStats = calculateWinStatsByColumnL(rows);

    if (battleRows.length === 0) {
      return null;
    }

    let sumSaxon = 0;
    let sumVirka = 0;
    let sumYablochko = 0;

    for (const row of battleRows) {
      sumSaxon += toNumber(row[4]);
      sumVirka += toNumber(row[5]);
      sumYablochko += toNumber(row[6]);
    }

    const lastRow = battleRows[battleRows.length - 1];

    const saxon = toNumber(lastRow[4]);      // E
    const virka = toNumber(lastRow[5]);      // F
    const yablochko = toNumber(lastRow[6]);  // G

    const avgSaxon = Math.round(sumSaxon / battleRows.length);
    const avgVirka = Math.round(sumVirka / battleRows.length);
    const avgYablochko = Math.round(sumYablochko / battleRows.length);

    return {
      battleNumber: String(lastRow[0] || "—").trim(),
      result: String(lastRow[10] || "—").trim(),

      battlesCount: winStats.battlesCount,
      wins: winStats.wins,
      winRate: winStats.winRate,

      saxon,
      virka,
      yablochko,

      avgSaxon,
      avgVirka,
      avgYablochko,

      total: saxon + virka + yablochko
    };
  }

  async function loadData() {
    try {
      const response = await fetch(URL + "&_=" + Date.now(), {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("HTTP " + response.status);
      }

      const text = await response.text();
      const rows = parseCSV(text);
      const stats = calculateStats(rows);

      if (!stats) {
        battleNumberEl.textContent = "—";
        battleResultEl.textContent = "—";
        battlesCountEl.textContent = "0";
        winsCountEl.textContent = "0";
        winRateEl.textContent = "0%";

        animateNumber(totalEl, lastTotal, 0, ANIMATION_MS);

        animateNumber(saxonEl, lastSaxon, 0, ANIMATION_MS);
        animateNumber(virkaEl, lastVirka, 0, ANIMATION_MS);
        animateNumber(yablochkoEl, lastYablochko, 0, ANIMATION_MS);

        animateNumber(avgSaxonEl, lastAvgSaxon, 0, ANIMATION_MS);
        animateNumber(avgVirkaEl, lastAvgVirka, 0, ANIMATION_MS);
        animateNumber(avgYablochkoEl, lastAvgYablochko, 0, ANIMATION_MS);

        lastTotal = 0;
        lastSaxon = 0;
        lastVirka = 0;
        lastYablochko = 0;
        lastAvgSaxon = 0;
        lastAvgVirka = 0;
        lastAvgYablochko = 0;

        return;
      }

      animateNumber(totalEl, lastTotal, stats.total, ANIMATION_MS);

      animateNumber(saxonEl, lastSaxon, stats.saxon, ANIMATION_MS);
      animateNumber(virkaEl, lastVirka, stats.virka, ANIMATION_MS);
      animateNumber(yablochkoEl, lastYablochko, stats.yablochko, ANIMATION_MS);

      animateNumber(avgSaxonEl, lastAvgSaxon, stats.avgSaxon, ANIMATION_MS);
      animateNumber(avgVirkaEl, lastAvgVirka, stats.avgVirka, ANIMATION_MS);
      animateNumber(avgYablochkoEl, lastAvgYablochko, stats.avgYablochko, ANIMATION_MS);

      battleNumberEl.textContent = stats.battleNumber || "—";
      battleResultEl.textContent = stats.result || "—";
      battlesCountEl.textContent = formatNumber(stats.battlesCount);
      winsCountEl.textContent = formatNumber(stats.wins);
      winRateEl.textContent = formatPercent(stats.winRate);

      lastTotal = stats.total;
      lastSaxon = stats.saxon;
      lastVirka = stats.virka;
      lastYablochko = stats.yablochko;
      lastAvgSaxon = stats.avgSaxon;
      lastAvgVirka = stats.avgVirka;
      lastAvgYablochko = stats.avgYablochko;

    } catch (error) {
      console.warn("Помилка завантаження Google Sheets:", error);
    }
  }

  loadData();
  setInterval(loadData, REFRESH_MS);
})();
</script>

</body>
</html>
